# ================================================================
# docker-compose.yml — 3つのコンテナをまとめて動かす『合奏指揮書』
# ----------------------------------------------------------------
# このファイルは Laravel 12 アプリをローカルで動かすための
# 『お弁当 3 つを同時に作って並べる指示書』です。
#
#   ① web         : PHP 8.x + Apache + Laravel 12
#   ② db          : MariaDB 10.11 (データベース)
#   ③ phpmyadmin  : DB の GUI 管理画面
#
# ★ このファイルは『量産テンプレート』です ★
#   新しい Laravel 12 プロジェクトでも、
#   このファイル + Dockerfile + docker/ フォルダをそのままコピーし、
#   `.env` の値だけ書き換えれば動くように設計されています。
#
# ★ 変数の読み込み方 ★
#   docker compose は、同じフォルダにある `.env` ファイルから
#   `${VAR_NAME}` の値を自動で取り込みます。
#   初めて動かす時は:
#     cp .env.docker.example .env
#   で `.env` を作り、値を書き換えてください。
#
# ★ 起動コマンド ★
#   docker compose up -d --build       ← 起動 (初回はビルド)
#   docker compose down                ← 停止
#   docker compose logs -f web         ← web のログを見る
#   docker compose exec web bash       ← web の中に入る
#
# ★ 用語メモ ★
#   service   : docker-compose が管理する『コンテナの論理名』
#   container : 実際に動いている『お弁当 (インスタンス)』
#   volume    : ホスト PC とコンテナ間でフォルダを共有する仕組み
#   network   : コンテナ同士を繋ぐ仮想 LAN
#   restart   : コンテナが落ちた時の自動再起動ルール
# ================================================================

# ================================================================
# ★ Compose V2 ではファイル形式の `version:` 指定は不要 ★
#   以前は `version: '3.9'` と書いていましたが、現在の
#   docker compose は無視する上に警告を出すので削除しました。
# ================================================================


# ================================================================
# 🏭 量産ガイド (このテンプレを別プロジェクトで使うときの手順書)
# ----------------------------------------------------------------
# このファイルは「1 つ作っておけば、次のプロジェクトでもコピペで
# 使い回せる」ように作られています (= 量産テンプレート)。
# 新しいプロジェクトに持っていくときは、基本的に
# このファイルは『さわらず』、代わりに `.env` ファイルの中身を
# 書き換えるだけで OK です。
#
# 【用語】
#   ・変数 (へんすう)        : 後から値を差し替えられる『箱』のこと。
#                               YAML の中では ${VAR_NAME} と書く。
#   ・環境変数 (environment variable):
#                               OS やコンテナに渡す『設定メモ』。
#                               .env ファイルに書くと自動で読まれる。
#   ・ポート (port)           : パソコンの中の『出入口の番号』。
#                               例: 8080 番の出入口に来た通信を
#                                   コンテナの中の 80 番に届ける。
#   ・コンテナ (container)    : 中にアプリが入っている『お弁当箱』。
#   ・イメージ (image)        : お弁当箱を作るための『レシピ』。
#   ・ボリューム (volume)     : ホスト PC とコンテナで
#                               フォルダを共有するしくみ。
#
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ ✅ 量産のときに .env で変える項目 (必須)          ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
#
#   (1) COMPOSE_PROJECT_NAME
#       → プロジェクト名。コンテナ名の頭につく目印。
#         例: taskflow → my-new-app に変える。
#         これを変えないと、別のプロジェクトを同時に動かすとき
#         『同じ名前のコンテナが 2 つある!』と怒られます。
#
#   (2) LARAVEL_DIR
#       → Laravel 本体のフォルダ名。
#         例: laravel_app → backend / api / src など好きな名前に。
#
#   (3) PUBLIC_DIR
#       → ブラウザから見える『公開フォルダ』の名前。
#         例: task-manager → public_html / www / frontend など。
#
#   (4) WEB_PORT / PMA_PORT / DB_PORT
#       → パソコンから見える『入口の番号』。
#         8080 / 8081 / 3306 が他のアプリに使われている時は、
#         別の番号 (例: 8090 / 8091 / 3307) に変える。
#
#   (5) DB_DATABASE / DB_USERNAME / DB_PASSWORD / DB_ROOT_PASSWORD
#       → データベースの名前・ユーザー・パスワード。
#         ☆ 本番公開するときは必ず強いパスワードに変える!
#
#   (6) APP_NAME / APP_URL
#       → Laravel アプリの名前と、ブラウザで開く URL。
#         例: APP_URL=http://localhost:8090
#
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ 🛠️ 量産のときに『この YAML を直接』変えてもいい所 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
#
#   ・DB を MariaDB から MySQL 8 に変えたい
#       → db サービスの `image:` を `mysql:8.0` に書き換える
#   ・phpMyAdmin を使わない (本番公開など)
#       → phpmyadmin サービス全体を丸ごとコメントアウト
#   ・Redis / Mailhog を足したい
#       → services の下に新しいサービスを追加
#
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ ❌ 触らないほうがいい所                           ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
#
#   ・`volumes: - ./:/var/www/html`
#       → ホスト側のフォルダまるごとを共有する設定。ここを変えると
#         ファイル編集がコンテナに届かなくなります。
#   ・`depends_on: db: condition: service_healthy`
#       → Laravel が起動する前に DB が元気になるのを待つ設定。
#         これを外すと「DB がまだ起きてないよ!」エラーで落ちます。
#   ・`networks:` ブロック
#       → コンテナ同士を繋ぐ『仮想 LAN ケーブル』。消すと
#         web から db に繋がらなくなります。
#
# ☆ 下のほうで書き換えポイントには 🔧 マークを付けています ☆
# ================================================================


# ================================================================
# services — 起動するコンテナの一覧
# ================================================================
services:


  # ================================================================
  # ① web — PHP + Apache + Laravel 12 のコンテナ
  # ----------------------------------------------------------------
  # アプリのフロント (HTML/CSS/JS) と
  # バックエンド (Laravel 12) を両方動かす主役のコンテナ。
  # ================================================================
  web:
    # ----------------------------------------------------------
    # build: ビルド設定 (Dockerfile からイメージを作る)
    # ----------------------------------------------------------
    #   context : Dockerfile の置き場所 (. = カレントフォルダ)
    #   args    : Dockerfile の ARG に渡す変数
    #
    # ★ ARG を経由させる理由 ★
    #   Dockerfile 内で「PHP のバージョン」「DocumentRoot」などを
    #   ハードコーディングせず、ビルド時に外から差し込むことで、
    #   1 つの Dockerfile を複数プロジェクトで使い回せます。
    # ----------------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile
      # ----------------------------------------------------------
      # 🔧 量産ポイント [A] ビルド時に渡す変数 (ARG)
      # ----------------------------------------------------------
      # ここの値は Dockerfile の ARG に届けられて、
      # PHP のバージョンや公開フォルダを差し替えます。
      # 直接書き換えず、.env ファイルの値を変えれば OK です。
      # ----------------------------------------------------------
      args:
        # PHP のバージョン。8.2 以上なら Laravel 12 が動きます。
        PHP_VERSION:  ${PHP_VERSION:-8.4}
        # ブラウザに公開するフォルダ名 (例: task-manager / public_html)
        PUBLIC_DIR:   ${PUBLIC_DIR:-task-manager}
        # タイムゾーン (日本なら Asia/Tokyo)
        TZ:           ${TZ:-Asia/Tokyo}
        # ファイルアップロードの上限サイズ (M = メガバイト)
        UPLOAD_MAX:   ${PHP_UPLOAD_MAX:-64M}
        # PHP が使えるメモリの上限
        MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}

    # ----------------------------------------------------------
    # 🔧 量産ポイント [B] コンテナ名
    # ----------------------------------------------------------
    # `docker exec` や `docker logs` で呼び出すときの名前です。
    # `${...:-default}` は「変数が無ければ default を使う」という意味。
    # .env の COMPOSE_PROJECT_NAME を変えれば頭の文字が変わります。
    # 例: taskflow_web → my-new-app_web
    # ----------------------------------------------------------
    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_web

    # ----------------------------------------------------------
    # 🔧 量産ポイント [C] 公開ポート (ホスト PC ←→ コンテナ)
    # ----------------------------------------------------------
    # 左が『パソコン側の番号』、右が『コンテナ側の番号』。
    # 例: "8080:80" = パソコンの 8080 に来た通信をコンテナの 80 に渡す
    #
    # 他のアプリ (XAMPP など) が 8080 を使っていると衝突するので、
    # その場合は .env の WEB_PORT を 8090 などに変えてください。
    # ----------------------------------------------------------
    ports:
      - "${WEB_PORT:-8080}:80"

    # ----------------------------------------------------------
    # volumes: フォルダ共有設定 (❌ここは基本さわらない)
    # ----------------------------------------------------------
    # 左(ホスト側のパス) : 右(コンテナ側のパス)
    #
    # プロジェクトのフォルダまるごとを /var/www/html につなげます。
    # こうすると、パソコンでファイルを編集した瞬間にコンテナにも
    # 反映されます (= 開発中の『ホットリロード』的な動き)。
    #
    # ☆ ここを変えるとファイルが届かなくなるので、
    #    量産でもこの 1 行はそのままにしておきます。
    # ----------------------------------------------------------
    volumes:
      - ./:/var/www/html

    # ----------------------------------------------------------
    # 🔧 量産ポイント [D] 環境変数 (Laravel に渡す設定メモ)
    # ----------------------------------------------------------
    # entrypoint.sh がここの値を使って、
    # コンテナの中の laravel_app/.env を自動で作ってくれます。
    # つまり Laravel 本体の .env を手で作らなくても動きます。
    #
    # ここの値はすべて『.env ファイル』から差し替えられるので、
    # 基本的に下の文字は触らず、.env の値だけを変えれば OK です。
    # ----------------------------------------------------------
    environment:
      # ---- Laravel アプリ自体の設定 ----
      # アプリの表示名 (例: TaskFlow / MyShop)
      APP_NAME:     ${APP_NAME:-Laravel}
      # 動いている場所 (local=開発 / production=本番)
      APP_ENV:      ${APP_ENV:-local}
      # エラー詳細の表示 (本番は必ず false にする)
      APP_DEBUG:    ${APP_DEBUG:-true}
      # ブラウザで開く URL (ポートを変えたらここも合わせる)
      APP_URL:      ${APP_URL:-http://localhost:8080}
      # タイムゾーン
      APP_TIMEZONE: ${TZ:-Asia/Tokyo}

      # ---- DB 接続情報 (Laravel が読む) ----
      # DB_HOST=db は『db サービス』という名前でつながる設定。
      # 同じ network に居るので、IP アドレスを書かなくても
      # サービス名だけで繋がります (= サービスディスカバリ)。
      DB_CONNECTION: mysql
      DB_HOST:       db
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-taskflow}
      DB_USERNAME:   ${DB_USERNAME:-taskflow_user}
      DB_PASSWORD:   ${DB_PASSWORD:-taskflow_pass}

      # ---- entrypoint.sh に渡す「Laravel 本体のフォルダ名」 ----
      # 例: laravel_app / backend / api / src
      LARAVEL_DIR:   ${LARAVEL_DIR:-laravel_app}

    # ----------------------------------------------------------
    # depends_on: 起動順序
    # ----------------------------------------------------------
    # web は db の後に起動 (Laravel が DB 接続できるように)
    # ----------------------------------------------------------
    depends_on:
      db:
        condition: service_healthy

    # ----------------------------------------------------------
    # restart: 再起動ポリシー
    # ----------------------------------------------------------
    # always = コンテナが落ちても自動的に再起動
    # ----------------------------------------------------------
    restart: always

    # ----------------------------------------------------------
    # networks: 所属する仮想ネットワーク
    # ----------------------------------------------------------
    networks:
      - app_network


  # ================================================================
  # ② db — MariaDB データベース
  # ----------------------------------------------------------------
  # データ (タスク / ユーザー / ログ / 添付情報) を保存する DB。
  # 初回起動時に task-manager/sql/*.sql を自動実行して
  # テーブルを作成します。
  # ================================================================
  db:
    # ----------------------------------------------------------
    # 🔧 量産ポイント [E] DB 種類 (image)
    # ----------------------------------------------------------
    # 公式イメージ (MariaDB 10.11 = 長期サポート版)。
    # MySQL が好きな人は `mysql:8.0` に書き換えても動きます。
    # PostgreSQL に変えたい場合はここと environment を丸ごと書き換え。
    # ----------------------------------------------------------
    image: mariadb:10.11

    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_db

    # ----------------------------------------------------------
    # 🔧 量産ポイント [F] データベースの初期設定
    # ----------------------------------------------------------
    # これらは『初回起動のとき』だけ有効です。
    # 2 回目以降は ./db_data/ に残った設定が使われるので、
    # パスワードを途中で変えたいときは下の手順が必要:
    #   1) docker compose down -v   (← -v で db_data も消す)
    #   2) .env のパスワードを書き換える
    #   3) docker compose up -d --build
    #
    # ☆ 本番で公開するときは必ず強いパスワードに変えること!
    # ----------------------------------------------------------
    environment:
      # 管理者(root)のパスワード
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      # 最初に作られるデータベース名 (web 側の DB_DATABASE と一致必須)
      MYSQL_DATABASE:      ${DB_DATABASE:-taskflow}
      # 専用ユーザー (root ではなく普段はこっちを使う)
      MYSQL_USER:          ${DB_USERNAME:-taskflow_user}
      # 専用ユーザーのパスワード
      MYSQL_PASSWORD:      ${DB_PASSWORD:-taskflow_pass}
      # タイムゾーン (日本時間に揃えておく)
      TZ:                  ${TZ:-Asia/Tokyo}

    # ----------------------------------------------------------
    # volumes: データの永続化 + 初期化スクリプト
    # ----------------------------------------------------------
    volumes:
      # (1) DB データの永続化 (❌ここは触らない)
      #     MariaDB が /var/lib/mysql に書き込むデータを
      #     パソコンの ./db_data フォルダに保存します。
      #     こうしておくと、コンテナを消してもデータは残ります。
      - ./db_data:/var/lib/mysql

      # (2) 🔧 量産ポイント [G] 自動初期化スクリプトの置き場所
      #     `/docker-entrypoint-initdb.d` というコンテナ側の
      #     決まった場所に .sql / .sh ファイルを置いておくと、
      #     『db_data が空のとき』だけ自動で SQL を流してくれます。
      #     (= 初回起動で DB がまるごと組み上がる)
      #
      #     左側の `./${PUBLIC_DIR}/sql` を『自分のプロジェクトの
      #     SQL 置き場』に合わせてください。
      #     例: ./database/sql / ./sql-init など。
      #
      #     SQL 自動初期化を使わないときは行ごと消しても OK。
      #
      #     `ro` は read-only (読み取り専用) の略で、コンテナから
      #     そのフォルダに書き込みできないようにするしるしです。
      - ./${PUBLIC_DIR:-task-manager}/sql:/docker-entrypoint-initdb.d:ro

    # ----------------------------------------------------------
    # 🔧 量産ポイント [H] DB のポート公開
    # ----------------------------------------------------------
    # パソコン側の 3306 番を DB につなげます。
    # HeidiSQL / TablePlus / DBeaver など『パソコン用の DB ソフト』
    # から直接繋ぎたいときに使います。
    #
    # 使わないなら下の 2 行を消してしまっても、Laravel 本体は
    # ちゃんと動きます (コンテナ同士は network 経由で繋がるので)。
    #
    # 他のアプリが 3306 を使っているときは .env の DB_PORT を
    # 3307 などに変えてください。
    # ----------------------------------------------------------
    ports:
      - "${DB_PORT:-3306}:3306"

    # ----------------------------------------------------------
    # healthcheck: 生存確認
    # ----------------------------------------------------------
    # depends_on が service_healthy を待てるようにします。
    # mysqladmin ping で DB が応答するかを 5 秒ごとに確認。
    # ----------------------------------------------------------
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    restart: always

    networks:
      - app_network


  # ================================================================
  # ③ phpmyadmin — DB 管理画面 (ブラウザから操作できる)
  # ----------------------------------------------------------------
  # SQL を書かなくても、テーブルの中身を見たり編集したりできる
  # 便利な GUI ツール。開発中は必須級に便利。
  # ================================================================
  phpmyadmin:
    # 公式イメージをそのまま使う (設定ゼロで動く)
    image: phpmyadmin:latest

    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_phpmyadmin

    # ----------------------------------------------------------
    # 🔧 量産ポイント [I] phpMyAdmin のポート
    # ----------------------------------------------------------
    # ブラウザで http://localhost:8081 を開くと phpMyAdmin。
    # 他のアプリと被ったら .env の PMA_PORT を 8091 などに。
    #
    # ★ 本番公開するときの注意 ★
    #   phpMyAdmin を外の世界に出すのは危険なので、本番では
    #   この `phpmyadmin:` ブロック全体をコメントアウトして
    #   動かさないようにしてください。
    # ----------------------------------------------------------
    ports:
      - "${PMA_PORT:-8081}:80"

    # ----------------------------------------------------------
    # phpMyAdmin が DB につなぐときの情報
    # ----------------------------------------------------------
    # PMA_HOST=db は『db サービス』に繋ぎなさいという意味。
    # ここはサービス名なので量産でもそのまま使えます。
    # ----------------------------------------------------------
    environment:
      PMA_HOST:     db
      PMA_USER:     root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      # phpMyAdmin から SQL をインポートするときの最大サイズ
      UPLOAD_LIMIT: 256M
      TZ:           ${TZ:-Asia/Tokyo}

    # db が起動してから phpMyAdmin を立ち上げる
    depends_on:
      - db

    restart: always

    networks:
      - app_network


# ================================================================
# networks — コンテナ同士を繋ぐ仮想 LAN
# ----------------------------------------------------------------
# 同じ network に属するコンテナは、サービス名 (web / db / phpmyadmin)
# をホスト名として解決できます。
# 例: Laravel の .env で DB_HOST=db と書けば MariaDB に繋がる。
# ================================================================
networks:
  app_network:
    driver: bridge


# ================================================================
# 🏭 新しいプロジェクトに量産する時の手順 (クイックガイド)
# ----------------------------------------------------------------
#
# 【ステップ 1】 必要なファイルをコピーする
#   新しいプロジェクトの空フォルダに、以下を丸ごとコピーします。
#     ├─ docker/                  (中身そのまま)
#     ├─ Dockerfile
#     ├─ docker-compose.yml       (このファイル)
#     └─ .env.docker.example
#
# 【ステップ 2】 .env を作る
#     cp .env.docker.example .env
#
# 【ステップ 3】 .env の中の値を書き換える (★ここが一番大事★)
#   ┌─────────────────────────────────────────────────────┐
#   │ 必ず変えるべき 6 つの値                              │
#   ├─────────────────────────────────────────────────────┤
#   │ COMPOSE_PROJECT_NAME = 新しい名前 (例: my-shop)      │
#   │ LARAVEL_DIR          = Laravel 本体のフォルダ名      │
#   │ PUBLIC_DIR           = 公開フォルダ名                │
#   │ WEB_PORT / PMA_PORT / DB_PORT = 空いているポート     │
#   │ DB_DATABASE / DB_USERNAME / DB_PASSWORD = DB 情報    │
#   │ APP_NAME / APP_URL   = アプリ名と URL                │
#   └─────────────────────────────────────────────────────┘
#
# 【ステップ 4】 起動する
#     docker compose up -d --build
#
# 【ステップ 5】 動作確認
#     docker compose ps                                   ← 3 つ Up か
#     http://localhost:WEB_PORT/                          ← ブラウザ確認
#     http://localhost:PMA_PORT/                          ← phpMyAdmin
#
# ----------------------------------------------------------------
# 🗺️ このファイルの 🔧 量産ポイント 一覧 (どこを変えるかの地図)
# ----------------------------------------------------------------
#   [A] web の build.args          → PHP バージョン・公開フォルダ
#   [B] web の container_name      → コンテナの呼び名
#   [C] web の ports               → Web アプリのポート
#   [D] web の environment         → Laravel 側の設定すべて
#   [E] db の image                → 使う DB の種類 (MariaDB / MySQL)
#   [F] db の environment          → DB のパスワード・ユーザー
#   [G] db の volumes (initdb.d)   → SQL 自動実行フォルダの場所
#   [H] db の ports                → DB 直接接続ポート
#   [I] phpmyadmin の ports        → 管理画面のポート
#
# ----------------------------------------------------------------
# ⚠️ つまずきポイント集
# ----------------------------------------------------------------
#
# 【ポートが衝突する】
#   "Bind for 0.0.0.0:8080 failed: port is already allocated"
#   → 他のアプリが同じポートを使っています。
#     `.env` で WEB_PORT / PMA_PORT / DB_PORT を別の番号に変更。
#
# 【DB のパスワードを変えたのに反映されない】
#   → MariaDB は『初回起動だけ』環境変数を読むので、
#     一度 `docker compose down -v` でデータを消す必要があります。
#     (-v を付けないと db_data が残って古いパスワードが有効のまま)
#
# 【web コンテナが再起動ループする】
#   → `docker compose logs web` でログを見る。
#     composer install 失敗 / vendor/autoload.php 不在が多い。
#     復旧: docker compose exec web bash -c \
#           "cd /var/www/html/\$LARAVEL_DIR && composer install"
#
# 【2 つ以上のプロジェクトを同時に動かしたい】
#   → 両方の `.env` で以下を別の値にしておくこと:
#     COMPOSE_PROJECT_NAME / WEB_PORT / PMA_PORT / DB_PORT
#
# ----------------------------------------------------------------
# 🔐 本番公開するときのチェックリスト
# ----------------------------------------------------------------
#   □ APP_ENV=production / APP_DEBUG=false に変更
#   □ DB_ROOT_PASSWORD / DB_PASSWORD を強いパスワードに変更
#   □ phpmyadmin サービスを丸ごとコメントアウト (公開しない)
#   □ db の ports: 3306 の公開も消す (コンテナ内だけで使う)
#   □ HTTPS 化する (リバースプロキシ or Apache に SSL 設定)
# ================================================================
