# ================================================================
# docker-compose.yml — 3つのコンテナをまとめて動かす『合奏指揮書』
# ----------------------------------------------------------------
# このファイルは Laravel 12 アプリをローカルで動かすための
# 『お弁当 3 つを同時に作って並べる指示書』です。
#
#   ① web         : PHP 8.x + Apache + Laravel 12
#   ② db          : MariaDB 10.11 (データベース)
#   ③ phpmyadmin  : DB の GUI 管理画面
#
# ★ このファイルは『量産テンプレート』です ★
#   新しい Laravel 12 プロジェクトでも、
#   このファイル + Dockerfile + docker/ フォルダをそのままコピーし、
#   `.env` の値だけ書き換えれば動くように設計されています。
#
# ★ 変数の読み込み方 ★
#   docker compose は、同じフォルダにある `.env` ファイルから
#   `${VAR_NAME}` の値を自動で取り込みます。
#   初めて動かす時は:
#     cp .env.docker.example .env
#   で `.env` を作り、値を書き換えてください。
#
# ★ 起動コマンド ★
#   docker compose up -d --build       ← 起動 (初回はビルド)
#   docker compose down                ← 停止
#   docker compose logs -f web         ← web のログを見る
#   docker compose exec web bash       ← web の中に入る
#
# ★ 用語メモ ★
#   service   : docker-compose が管理する『コンテナの論理名』
#   container : 実際に動いている『お弁当 (インスタンス)』
#   volume    : ホスト PC とコンテナ間でフォルダを共有する仕組み
#   network   : コンテナ同士を繋ぐ仮想 LAN
#   restart   : コンテナが落ちた時の自動再起動ルール
# ================================================================

# ================================================================
# ★ Compose V2 ではファイル形式の `version:` 指定は不要 ★
#   以前は `version: '3.9'` と書いていましたが、現在の
#   docker compose は無視する上に警告を出すので削除しました。
# ================================================================


# ================================================================
# services — 起動するコンテナの一覧
# ================================================================
services:


  # ================================================================
  # ① web — PHP + Apache + Laravel 12 のコンテナ
  # ----------------------------------------------------------------
  # アプリのフロント (HTML/CSS/JS) と
  # バックエンド (Laravel 12) を両方動かす主役のコンテナ。
  # ================================================================
  web:
    # ----------------------------------------------------------
    # build: ビルド設定 (Dockerfile からイメージを作る)
    # ----------------------------------------------------------
    #   context : Dockerfile の置き場所 (. = カレントフォルダ)
    #   args    : Dockerfile の ARG に渡す変数
    #
    # ★ ARG を経由させる理由 ★
    #   Dockerfile 内で「PHP のバージョン」「DocumentRoot」などを
    #   ハードコーディングせず、ビルド時に外から差し込むことで、
    #   1 つの Dockerfile を複数プロジェクトで使い回せます。
    # ----------------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION:  ${PHP_VERSION:-8.4}
        PUBLIC_DIR:   ${PUBLIC_DIR:-task-manager}
        TZ:           ${TZ:-Asia/Tokyo}
        UPLOAD_MAX:   ${PHP_UPLOAD_MAX:-64M}
        MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}

    # コンテナ名 (docker exec の時に使う)
    # `${...:-default}` は「変数が無ければ default を使う」の意味
    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_web

    # ----------------------------------------------------------
    # ports: ホスト PC ←→ コンテナ間のポート対応
    # ----------------------------------------------------------
    # 左(ホスト) : 右(コンテナ) の順番。
    # 例: "8080:80" = ホストの 8080 を叩くとコンテナの 80 に届く
    # ----------------------------------------------------------
    ports:
      - "${WEB_PORT:-8080}:80"

    # ----------------------------------------------------------
    # volumes: フォルダ共有設定
    # ----------------------------------------------------------
    # 左(ホスト側のパス) : 右(コンテナ側のパス)
    #
    # プロジェクトルート全体を /var/www/html にマウントすると、
    # ホスト側で編集したファイルがすぐコンテナに反映されます。
    # (= 開発中の『ホットリロード』的な動き)
    # ----------------------------------------------------------
    volumes:
      - ./:/var/www/html

    # ----------------------------------------------------------
    # environment: 環境変数
    # ----------------------------------------------------------
    # entrypoint.sh がここの値を使って laravel_app/.env を
    # 自動生成します。開発者は .env を手で作らなくて OK。
    # ----------------------------------------------------------
    environment:
      # Laravel 自体の基本設定
      APP_NAME:     ${APP_NAME:-Laravel}
      APP_ENV:      ${APP_ENV:-local}
      APP_DEBUG:    ${APP_DEBUG:-true}
      APP_URL:      ${APP_URL:-http://localhost:8080}
      APP_TIMEZONE: ${TZ:-Asia/Tokyo}

      # DB 接続情報 (Laravel が .env 経由で読む)
      DB_CONNECTION: mysql
      DB_HOST:       db
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-laravel}
      DB_USERNAME:   ${DB_USERNAME:-root}
      DB_PASSWORD:   ${DB_PASSWORD:-root}

      # entrypoint.sh に渡す「Laravel 本体のフォルダ名」
      LARAVEL_DIR:   ${LARAVEL_DIR:-laravel_app}

    # ----------------------------------------------------------
    # depends_on: 起動順序
    # ----------------------------------------------------------
    # web は db の後に起動 (Laravel が DB 接続できるように)
    # ----------------------------------------------------------
    depends_on:
      db:
        condition: service_healthy

    # ----------------------------------------------------------
    # restart: 再起動ポリシー
    # ----------------------------------------------------------
    # always = コンテナが落ちても自動的に再起動
    # ----------------------------------------------------------
    restart: always

    # ----------------------------------------------------------
    # networks: 所属する仮想ネットワーク
    # ----------------------------------------------------------
    networks:
      - app_network


  # ================================================================
  # ② db — MariaDB データベース
  # ----------------------------------------------------------------
  # データ (タスク / ユーザー / ログ / 添付情報) を保存する DB。
  # 初回起動時に task-manager/sql/*.sql を自動実行して
  # テーブルを作成します。
  # ================================================================
  db:
    # 公式イメージ (MariaDB 10.11 = 最新安定版の 1 つ)
    # MySQL 系なら `mysql:8.0` に書き換えても OK
    image: mariadb:10.11

    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_db

    # ----------------------------------------------------------
    # environment: MariaDB の初期設定
    # ----------------------------------------------------------
    # これらは『初回起動時のみ』有効です。
    # 2 回目以降は db_data/ に残った設定が優先されます。
    # ----------------------------------------------------------
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE:      ${DB_DATABASE:-laravel}
      MYSQL_USER:          ${DB_USERNAME:-laravel_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-laravel_pass}
      TZ:                  ${TZ:-Asia/Tokyo}

    # ----------------------------------------------------------
    # volumes: データの永続化 + 初期化スクリプト
    # ----------------------------------------------------------
    volumes:
      # 1) DB データの永続化
      #    MariaDB が /var/lib/mysql に書き込むデータを
      #    ホスト PC の ./db_data に保存。
      #    コンテナを削除してもデータは残ります。
      - ./db_data:/var/lib/mysql

      # 2) 自動初期化スクリプト
      #    下記フォルダ内の .sql / .sh ファイルが、
      #    『db_data が空の時』だけ自動実行されます。
      #    これで「初回起動 = DB まるごと自動構築」が実現します。
      #
      #    ro = read-only (コンテナからの書き込み禁止)
      - ./${PUBLIC_DIR:-task-manager}/sql:/docker-entrypoint-initdb.d:ro

    # ----------------------------------------------------------
    # ports: ホスト側 3306 を公開
    # ----------------------------------------------------------
    # ホスト PC の MySQL クライアント (HeidiSQL, TablePlus 等) から
    # 直接繋ぎたい時に使います。使わなければコメントアウトで OK。
    # ----------------------------------------------------------
    ports:
      - "${DB_PORT:-3306}:3306"

    # ----------------------------------------------------------
    # healthcheck: 生存確認
    # ----------------------------------------------------------
    # depends_on が service_healthy を待てるようにします。
    # mysqladmin ping で DB が応答するかを 5 秒ごとに確認。
    # ----------------------------------------------------------
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    restart: always

    networks:
      - app_network


  # ================================================================
  # ③ phpmyadmin — DB 管理画面 (ブラウザから操作できる)
  # ----------------------------------------------------------------
  # SQL を書かなくても、テーブルの中身を見たり編集したりできる
  # 便利な GUI ツール。開発中は必須級に便利。
  # ================================================================
  phpmyadmin:
    image: phpmyadmin:latest

    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_phpmyadmin

    # ブラウザで http://localhost:8081 を開くと phpMyAdmin
    ports:
      - "${PMA_PORT:-8081}:80"

    # phpMyAdmin の接続先情報
    environment:
      PMA_HOST:     db
      PMA_USER:     root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 256M
      TZ:           ${TZ:-Asia/Tokyo}

    depends_on:
      - db

    restart: always

    networks:
      - app_network


# ================================================================
# networks — コンテナ同士を繋ぐ仮想 LAN
# ----------------------------------------------------------------
# 同じ network に属するコンテナは、サービス名 (web / db / phpmyadmin)
# をホスト名として解決できます。
# 例: Laravel の .env で DB_HOST=db と書けば MariaDB に繋がる。
# ================================================================
networks:
  app_network:
    driver: bridge


# ================================================================
# 補足: 新しいプロジェクトに量産する時の手順
# ----------------------------------------------------------------
# 1. このリポジトリをコピー (git clone またはフォルダごとコピー)
# 2. `.env.docker.example` を `.env` にリネーム
# 3. `.env` の中の値 (COMPOSE_PROJECT_NAME, ポート等) を書き換え
# 4. `docker compose up -d --build` を実行
# 5. http://localhost:WEB_PORT/ にアクセス
#
# 【ポート競合時】
#   他のプロジェクトが 8080 / 8081 / 3306 を使っていたら、
#   `.env` で別のポートに変更してください。
#
# 【本番化】
#   APP_ENV=production / APP_DEBUG=false
#   DB_* を強いパスワードに変更
#   phpmyadmin サービスはコメントアウト (本番で公開しない)
# ================================================================
