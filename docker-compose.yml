# ================================================================
# docker-compose.yml — 3つのコンテナをまとめて動かす『合奏指揮書』
# ----------------------------------------------------------------
# このファイルは Laravel 12 アプリをローカルで動かすための
# 『お弁当 3 つを同時に作って並べる指示書』です。
#
#   ① web         : PHP 8.x + Apache + Laravel 12
#   ② db          : MariaDB 10.11 (データベース)
#   ③ phpmyadmin  : DB の GUI 管理画面
#
# ★ このファイルは『量産テンプレート』です ★
#   新しい Laravel 12 プロジェクトでも、
#   このファイル + Dockerfile + docker/ フォルダをそのままコピーし、
#   `.env` の値だけ書き換えれば動くように設計されています。
#
# ★ 変数の読み込み方 ★
#   docker compose は、同じフォルダにある `.env` ファイルから
#   `${VAR_NAME}` の値を自動で取り込みます。
#   初めて動かす時は:
#     cp .env.docker.example .env
#   で `.env` を作り、値を書き換えてください。
#
# ★ 起動コマンド ★
#   docker compose up -d --build       ← 起動 (初回はビルド)
#   docker compose down                ← 停止
#   docker compose logs -f web         ← web のログを見る
#   docker compose exec web bash       ← web の中に入る
#
# ★ 用語メモ ★
#   service   : docker-compose が管理する『コンテナの論理名』
#   container : 実際に動いている『お弁当 (インスタンス)』
#   volume    : ホスト PC とコンテナ間でフォルダを共有する仕組み
#   network   : コンテナ同士を繋ぐ仮想 LAN
#   restart   : コンテナが落ちた時の自動再起動ルール
# ================================================================

# ================================================================
# ★ Compose V2 ではファイル形式の `version:` 指定は不要 ★
#   以前は `version: '3.9'` と書いていましたが、現在の
#   docker compose は無視する上に警告を出すので削除しました。
# ================================================================


# ================================================================
# 🏭 量産ガイド (このテンプレを別プロジェクトで使うときの手順書)
# ----------------------------------------------------------------
# このファイルは「1 つ作っておけば、次のプロジェクトでもコピペで
# 使い回せる」ように作られています (= 量産テンプレート)。
# 新しいプロジェクトに持っていくときは、基本的に
# このファイルは『さわらず』、代わりに `.env` ファイルの中身を
# 書き換えるだけで OK です。
#
# 【用語】
#   ・変数 (へんすう)        : 後から値を差し替えられる『箱』のこと。
#                               YAML の中では ${VAR_NAME} と書く。
#   ・環境変数 (environment variable):
#                               OS やコンテナに渡す『設定メモ』。
#                               .env ファイルに書くと自動で読まれる。
#   ・ポート (port)           : パソコンの中の『出入口の番号』。
#                               例: 8080 番の出入口に来た通信を
#                                   コンテナの中の 80 番に届ける。
#   ・コンテナ (container)    : 中にアプリが入っている『お弁当箱』。
#   ・イメージ (image)        : お弁当箱を作るための『レシピ』。
#   ・ボリューム (volume)     : ホスト PC とコンテナで
#                               フォルダを共有するしくみ。
#
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ ✅ 量産のときに .env で変える項目 (必須)          ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
#
#   (1) COMPOSE_PROJECT_NAME
#       → プロジェクト名。コンテナ名の頭につく目印。
#         例: taskflow → my-new-app に変える。
#         これを変えないと、別のプロジェクトを同時に動かすとき
#         『同じ名前のコンテナが 2 つある!』と怒られます。
#
#   (2) LARAVEL_DIR
#       → Laravel 本体のフォルダ名。
#         例: laravel_app → backend / api / src など好きな名前に。
#
#   (3) PUBLIC_DIR
#       → ブラウザから見える『公開フォルダ』の名前。
#         例: task-manager → public_html / www / frontend など。
#
#   (4) WEB_PORT / PMA_PORT / DB_PORT
#       → パソコンから見える『入口の番号』。
#         8080 / 8081 / 3306 が他のアプリに使われている時は、
#         別の番号 (例: 8090 / 8091 / 3307) に変える。
#
#   (5) DB_DATABASE / DB_USERNAME / DB_PASSWORD / DB_ROOT_PASSWORD
#       → データベースの名前・ユーザー・パスワード。
#         ☆ 本番公開するときは必ず強いパスワードに変える!
#
#   (6) APP_NAME / APP_URL
#       → Laravel アプリの名前と、ブラウザで開く URL。
#         例: APP_URL=http://localhost:8090
#
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ 🛠️ 量産のときに『この YAML を直接』変えてもいい所 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
#
#   ・DB を MariaDB から MySQL 8 に変えたい
#       → db サービスの `image:` を `mysql:8.0` に書き換える
#   ・phpMyAdmin を使わない (本番公開など)
#       → phpmyadmin サービス全体を丸ごとコメントアウト
#   ・Redis / Mailhog を足したい
#       → services の下に新しいサービスを追加
#
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃ ❌ 触らないほうがいい所                           ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
#
#   ・`volumes: - ./:/var/www/html`
#       → ホスト側のフォルダまるごとを共有する設定。ここを変えると
#         ファイル編集がコンテナに届かなくなります。
#   ・`depends_on: db: condition: service_healthy`
#       → Laravel が起動する前に DB が元気になるのを待つ設定。
#         これを外すと「DB がまだ起きてないよ!」エラーで落ちます。
#   ・`networks:` ブロック
#       → コンテナ同士を繋ぐ『仮想 LAN ケーブル』。消すと
#         web から db に繋がらなくなります。
#
# ☆ 下のほうで書き換えポイントには 🔧 マークを付けています ☆
# ================================================================


# ================================================================
# services — 起動するコンテナの一覧
# ================================================================
services:


  # ================================================================
  # ① web — PHP + Apache + Laravel 12 のコンテナ
  # ----------------------------------------------------------------
  # アプリのフロント (HTML/CSS/JS) と
  # バックエンド (Laravel 12) を両方動かす主役のコンテナ。
  # ================================================================
  web:
    # ----------------------------------------------------------
    # build: ビルド設定 (Dockerfile からイメージを作る)
    # ----------------------------------------------------------
    #   context : Dockerfile の置き場所 (. = カレントフォルダ)
    #   args    : Dockerfile の ARG に渡す変数
    #
    # ★ ARG を経由させる理由 ★
    #   Dockerfile 内で「PHP のバージョン」「DocumentRoot」などを
    #   ハードコーディングせず、ビルド時に外から差し込むことで、
    #   1 つの Dockerfile を複数プロジェクトで使い回せます。
    # ----------------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile
      # ==========================================================
      # 🔧 量産ポイント [A] ビルド時に渡す変数 (ARG)
      # ----------------------------------------------------------
      # 【ARG って何?】
      #   ARG (アーギュメント) = Dockerfile の『ビルド (組み立て)』
      #   の途中でだけ使える、部品を差し替えるための『設定メモ』。
      #   例えるなら、同じレゴの組み立て説明書で「今回は赤いブロック」
      #   「今回は青いブロック」と部品の色だけ入れ替えられる仕組み。
      #
      # 【なぜ args が必要?】
      #   Dockerfile の中に「PHP 8.4 で作る」「task-manager を公開する」
      #   と直接書いてしまうと、次のプロジェクトでそのまま使えません。
      #   args を通して外から値を渡すと、同じ Dockerfile を使い回せます。
      #   (= 量産テンプレートにできる)
      #
      # 【どうやって値を差し替える?】
      #   このファイルは直接書き換えません。プロジェクトの一番上にある
      #   `.env` ファイルの値を書き換えると、${VAR:-default} の仕組みで
      #   自動的にここに反映されます。
      # ==========================================================
      args:

        # ------------------------------------------------------
        # PHP_VERSION — PHP のバージョン
        # ------------------------------------------------------
        # 【意味】 PHP 本体の年式みたいなもの。新しいほうが速いし
        #          新しい書き方が使えるけど、対応ライブラリが
        #          追いついていないこともある。
        #
        # 【選び方】
        #   ・Laravel 12 を使うなら PHP 8.2 以上 (必須)
        #   ・おすすめは 8.4 (今のところ一番安定)
        #   ・8.5 にするとビルドで失敗することがあるので注意
        #
        # 【変える時】
        #   ・Laravel のバージョンが要求する PHP が変わった時
        #   ・本番サーバーの PHP バージョンに揃えたい時
        #
        # 【書き換え方】
        #   .env ファイルで:
        #     PHP_VERSION=8.3   ← 8.3 にしたい場合
        # ------------------------------------------------------
        PHP_VERSION:  ${PHP_VERSION:-8.4}

        # ------------------------------------------------------
        # PUBLIC_DIR — ブラウザから見える『公開フォルダ』の名前
        # ------------------------------------------------------
        # 【意味】 DocumentRoot (ドキュメントルート) とも言う。
        #          Apache が「このフォルダの中だけはブラウザに見せていい」
        #          と認めた玄関フォルダのこと。
        #
        # 【なぜこれを変えるの?】
        #   プロジェクトごとに玄関フォルダの名前はちがいます。
        #   例: task-manager / public_html / www / frontend / public
        #
        # 【変える時】
        #   ・別のプロジェクトに持っていく時
        #   ・公開フォルダ名を変えたくなった時
        #
        # 【書き換え方】
        #   .env ファイルで:
        #     PUBLIC_DIR=public_html   ← お店のアプリなどの場合
        #
        # 【注意】 ここを変えたら [G] の SQL 初期化フォルダの場所も
        #          同じ値が使われるので、sql フォルダもその場所に
        #          置いておく必要があります。
        # ------------------------------------------------------
        PUBLIC_DIR:   ${PUBLIC_DIR:-task-manager}

        # ------------------------------------------------------
        # TZ — タイムゾーン (時差)
        # ------------------------------------------------------
        # 【意味】 どこの国の時間を使うか、という設定。
        #          これを間違えると、タスクの作成日時が 9 時間ズレたり、
        #          ログに書かれる時刻が UTC (世界標準時) になったりします。
        #
        # 【選び方】
        #   ・日本国内で使う → Asia/Tokyo
        #   ・アメリカ東海岸 → America/New_York
        #   ・イギリス        → Europe/London
        #
        # 【変える時】
        #   ・海外向けのアプリを作る時
        # ------------------------------------------------------
        TZ:           ${TZ:-Asia/Tokyo}

        # ------------------------------------------------------
        # UPLOAD_MAX — ファイルアップロードの上限サイズ
        # ------------------------------------------------------
        # 【意味】 ブラウザから送れるファイルの最大サイズ。
        #          php.ini の upload_max_filesize と post_max_size を
        #          まとめて設定します。
        #          M = メガバイト (100M なら 100 メガまで)。
        #
        # 【変える時】
        #   ・画像や動画をアップロードしたい → 128M / 256M など
        #   ・PDF や Excel だけで十分       → 32M で OK
        #
        # 【書き換え方】
        #   .env ファイルで:
        #     PHP_UPLOAD_MAX=128M
        # ------------------------------------------------------
        UPLOAD_MAX:   ${PHP_UPLOAD_MAX:-64M}

        # ------------------------------------------------------
        # MEMORY_LIMIT — PHP が使える『考えるスペース』の上限
        # ------------------------------------------------------
        # 【意味】 PHP が 1 回のリクエストで使える最大メモリ。
        #          少なすぎると大きな処理の途中で
        #          「Out of memory (メモリ足りない)」エラーで止まります。
        #
        # 【目安】
        #   ・小さなアプリ           : 256M
        #   ・Laravel の普通サイズ   : 512M (今の設定)
        #   ・大量データ処理や画像変換: 1024M
        #
        # 【書き換え方】
        #   .env ファイルで:
        #     PHP_MEMORY_LIMIT=1024M
        # ------------------------------------------------------
        MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}

    # ==========================================================
    # 🔧 量産ポイント [B] container_name — コンテナの呼び名
    # ----------------------------------------------------------
    # 【コンテナ名 って何?】
    #   docker にはたくさんのコンテナが同時に動くので、
    #   『どのコンテナに話しかけるか』を名前で指定します。
    #   家族の中でも「お兄ちゃん」「妹」と呼び分けるのと同じです。
    #
    # 【どこで使われる?】
    #   ・docker exec taskflow_web bash   (コンテナの中に入るとき)
    #   ・docker logs taskflow_web         (ログを見るとき)
    #   ・docker stop taskflow_web         (止めるとき)
    #
    # 【`${...:-default}` って何?】
    #   「この変数があればその値、なければ default を使う」という書き方。
    #   例: ${COMPOSE_PROJECT_NAME:-taskflow}
    #       → .env に COMPOSE_PROJECT_NAME=my-shop と書けば `my-shop`
    #       → .env に書かなければ自動的に `taskflow` が使われる
    #
    # 【変えないとどうなる?】
    #   別プロジェクトで同時に動かすと「taskflow_web がもう存在する!」
    #   と怒られて起動失敗します。プロジェクトごとに必ず違う名前に。
    #
    # 【書き換え方】
    #   .env ファイルで:
    #     COMPOSE_PROJECT_NAME=my-shop
    #   → コンテナ名が `my-shop_web` / `my-shop_db` / `my-shop_phpmyadmin`
    #     に自動で変わります。
    # ==========================================================
    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_web

    # ==========================================================
    # 🔧 量産ポイント [C] ports — Web アプリの公開ポート
    # ----------------------------------------------------------
    # 【ポート (port) って何?】
    #   パソコンの中にある『出入口の番号』のこと。
    #   1 台のパソコンに 65535 個の出入口があって、
    #   アプリごとに『この番号を使います』と予約して使います。
    #
    #   よく使われる番号の例:
    #     80   : HTTP (普通のブラウザ通信)
    #     443  : HTTPS (暗号化されたブラウザ通信)
    #     3306 : MySQL / MariaDB
    #     8080 : 開発用 Web サーバー (よく使われる)
    #
    # 【"8080:80" の読み方 — ポートフォワーディング】
    #   左 = ホスト (パソコン本体) 側のポート番号
    #   右 = コンテナ (お弁当箱) 側のポート番号
    #
    #     ┌──────────┐    ┌────────────────┐
    #     │パソコン側│    │コンテナの中    │
    #     │   8080   │───▶│   80 (Apache)  │
    #     └──────────┘    └────────────────┘
    #
    #   ブラウザで http://localhost:8080 を開くと、
    #   8080 番の出入口からコンテナの 80 番 (Apache) に届きます。
    #   この『入口と出口を結ぶ橋』を『ポートフォワーディング』と呼びます。
    #
    # 【変える時】
    #   ・他のアプリ (XAMPP / IIS / 別の Docker) が 8080 を使っている
    #   ・複数のプロジェクトを同時に動かしたい
    #
    # 【"Bind for 0.0.0.0:8080 failed" エラーが出たら】
    #   8080 が他に使われています。.env で WEB_PORT=8090 などに変更。
    #
    # 【書き換え方】
    #   .env ファイルで:
    #     WEB_PORT=8090
    #   さらに APP_URL も合わせて変える:
    #     APP_URL=http://localhost:8090
    # ==========================================================
    ports:
      - "${WEB_PORT:-8080}:80"

    # ----------------------------------------------------------
    # volumes: フォルダ共有設定 (❌ここは基本さわらない)
    # ----------------------------------------------------------
    # 左(ホスト側のパス) : 右(コンテナ側のパス)
    #
    # プロジェクトのフォルダまるごとを /var/www/html につなげます。
    # こうすると、パソコンでファイルを編集した瞬間にコンテナにも
    # 反映されます (= 開発中の『ホットリロード』的な動き)。
    #
    # ☆ ここを変えるとファイルが届かなくなるので、
    #    量産でもこの 1 行はそのままにしておきます。
    # ----------------------------------------------------------
    volumes:
      - ./:/var/www/html

    # ==========================================================
    # 🔧 量産ポイント [D] environment — Laravel に渡す設定メモ
    # ----------------------------------------------------------
    # 【環境変数 (environment variable) って何?】
    #   コンテナの中のプログラムに『これ使ってね』と渡す設定メモです。
    #   プログラムは起動すると、部屋に貼ってあるメモ (環境変数) を
    #   読みながら動きます。
    #
    # 【このブロックの役割】
    #   entrypoint.sh (コンテナ起動時に一番最初に走るスクリプト) が
    #   ここの値を使って、Laravel の設定ファイル
    #   (laravel_app/.env) を自動で生成します。
    #   → 開発者は手で .env を書かなくて OK という仕組み。
    #
    # 【書き換え方】
    #   下の値は直接いじらず、プロジェクトの .env ファイルを
    #   書き換えると自動でここに反映されます (${VAR:-default} のしくみ)。
    # ==========================================================
    environment:

      # ========== Laravel アプリ自体の設定 ==========

      # ------------------------------------------------------
      # APP_NAME — アプリの表示名
      # ------------------------------------------------------
      # 【意味】 ブラウザのタブ / メール通知の送信元などに出る
      #          アプリの名前。人間が見る名前なので日本語も OK。
      # 【例】  TaskFlow / MyShop / みんなの予定表
      # 【書換】 .env に: APP_NAME=みんなの予定表
      # ------------------------------------------------------
      APP_NAME:     ${APP_NAME:-Laravel}

      # ------------------------------------------------------
      # APP_ENV — 動いている場所 (環境モード)
      # ------------------------------------------------------
      # 【意味】 今コンテナが『どこの環境』で動いているか。
      #          Laravel はこの値を見てログの出し方やキャッシュの
      #          効かせ方を自動で切り替えます。
      # 【値】
      #   local       : 自分のパソコン (開発中)
      #   testing     : 自動テスト中
      #   staging     : 本番の 1 歩手前 (お試しサーバー)
      #   production  : 本番 (インターネットに公開)
      # 【書換】 .env に: APP_ENV=production
      # ------------------------------------------------------
      APP_ENV:      ${APP_ENV:-local}

      # ------------------------------------------------------
      # APP_DEBUG — エラー画面に詳細を出すかどうか
      # ------------------------------------------------------
      # 【意味】 true にするとエラーが出たとき、原因のコードや
      #          変数の中身までブラウザに表示されます (開発中に便利)。
      #          でも本番で true のままだと、パスワードや
      #          秘密の設定がブラウザに漏れてしまう大事故に!
      # 【鉄則】 本番では絶対 false。開発中だけ true。
      # 【書換】 .env に: APP_DEBUG=false
      # ------------------------------------------------------
      APP_DEBUG:    ${APP_DEBUG:-true}

      # ------------------------------------------------------
      # APP_URL — アプリが動いている場所の URL
      # ------------------------------------------------------
      # 【意味】 Laravel が「自分はどこの URL にいるか」を知る目印。
      #          メール内のリンクや画像の絶対パス生成に使われます。
      # 【注意】 [C] で WEB_PORT を変えたら、ここもセットで変える必要あり。
      #          例: WEB_PORT=8090 なら APP_URL=http://localhost:8090
      # 【本番】 https://example.com のように本番 URL に書き換え
      # ------------------------------------------------------
      APP_URL:      ${APP_URL:-http://localhost:8080}

      # ------------------------------------------------------
      # APP_TIMEZONE — Laravel が扱う時間帯
      # ------------------------------------------------------
      # 【意味】 PHP 側の TZ と合わせておかないと、DB に保存される
      #          日時と表示される日時がズレます。
      # ------------------------------------------------------
      APP_TIMEZONE: ${TZ:-Asia/Tokyo}


      # ========== DB 接続情報 (Laravel から DB への行き方) ==========
      #
      # 【ここで使われている技術用語】
      #
      #   ・DB_CONNECTION
      #       使う DB の種類 (mysql / pgsql / sqlite など)。
      #       MariaDB も MySQL と互換なので `mysql` で OK。
      #
      #   ・DB_HOST (= db)
      #       DB サーバーのアドレス。
      #       ここに書いた `db` は、下の services で定義した
      #       『db サービス』の名前。同じ network にいるコンテナは
      #       IP アドレスを書かなくてもサービス名だけで繋がります。
      #       これを『サービスディスカバリ (service discovery)』と言います。
      #       (= 同じ教室の中なら名前で呼べばすぐ返事がくる感覚)
      #
      #   ・DB_PORT (= 3306)
      #       DB が待ち受けているポート番号。MySQL / MariaDB は 3306 が標準。
      #       ここは『コンテナの中から見た番号』なので、[H] で
      #       ホスト側のポートを変えても、ここは 3306 のままで OK。
      #
      #   ・DB_DATABASE / DB_USERNAME / DB_PASSWORD
      #       使うデータベース名と、そこにログインするユーザー・パスワード。
      #       ★ 下の [F] の MYSQL_* と『必ず同じ値』にする必要あり ★
      #       (.env を書き換えれば自動で両方に反映されるので安心)

      DB_CONNECTION: mysql
      DB_HOST:       db
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-taskflow}
      DB_USERNAME:   ${DB_USERNAME:-taskflow_user}
      DB_PASSWORD:   ${DB_PASSWORD:-taskflow_pass}


      # ========== その他 ==========

      # ------------------------------------------------------
      # LARAVEL_DIR — Laravel 本体が入っているフォルダの名前
      # ------------------------------------------------------
      # 【意味】 プロジェクトの中で Laravel 本体 (composer.json や
      #          artisan がある場所) が入っているフォルダ名。
      #          entrypoint.sh がこの名前を使って
      #          composer install や artisan コマンドを走らせます。
      # 【例】  laravel_app / backend / api / src
      # 【書換】 .env に: LARAVEL_DIR=backend
      # 【注意】 実際のフォルダ名と必ず一致させること。
      #          間違えると「Laravel ディレクトリが見つかりません」
      #          エラーで起動しません。
      # ------------------------------------------------------
      LARAVEL_DIR:   ${LARAVEL_DIR:-laravel_app}

    # ----------------------------------------------------------
    # depends_on: 起動順序
    # ----------------------------------------------------------
    # web は db の後に起動 (Laravel が DB 接続できるように)
    # ----------------------------------------------------------
    depends_on:
      db:
        condition: service_healthy

    # ----------------------------------------------------------
    # restart: 再起動ポリシー
    # ----------------------------------------------------------
    # always = コンテナが落ちても自動的に再起動
    # ----------------------------------------------------------
    restart: always

    # ----------------------------------------------------------
    # networks: 所属する仮想ネットワーク
    # ----------------------------------------------------------
    networks:
      - app_network


  # ================================================================
  # ② db — MariaDB データベース
  # ----------------------------------------------------------------
  # データ (タスク / ユーザー / ログ / 添付情報) を保存する DB。
  # 初回起動時に task-manager/sql/*.sql を自動実行して
  # テーブルを作成します。
  # ================================================================
  db:
    # ==========================================================
    # 🔧 量産ポイント [E] image — 使う DB の種類
    # ----------------------------------------------------------
    # 【イメージ (image) って何?】
    #   コンテナを作るための『レシピ本』みたいなもの。
    #   Docker Hub (= Docker の公式お店) に
    #   誰かが作った完成品レシピが並んでいて、そこから
    #   好きなものをダウンロードして使えます。
    #
    # 【`mariadb:10.11` の読み方】
    #   左 = イメージ名 (お店の中の商品名)
    #   右 = タグ (= バージョン)
    #
    #     mariadb : 10.11
    #        ↑       ↑
    #       名前   バージョン番号
    #
    #   タグを `latest` にすると「常に最新版」になりますが、
    #   ある日 alert: 突然新バージョンに更新されて動かなくなる、
    #   なんてこともあるので、必ず『固定バージョン』を書くのが
    #   プロの作法です (= バージョンピン留め)。
    #
    # 【変える時】
    #   ・MySQL に統一したい        → `mysql:8.0`
    #   ・MariaDB の別バージョン    → `mariadb:10.6` / `mariadb:11.4`
    #   ・PostgreSQL に変えたい     → `postgres:16`
    #     (この場合は下の environment も書き換えが必要)
    #
    # 【MariaDB と MySQL の違い】
    #   元は同じ血筋 (MariaDB は MySQL から分岐した子供みたいなもの)。
    #   ほとんどの SQL 文はそのまま動くので、Laravel では
    #   DB_CONNECTION=mysql のままで MariaDB にも繋がります。
    # ==========================================================
    image: mariadb:10.11

    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_db

    # ==========================================================
    # 🔧 量産ポイント [F] environment — DB の初期設定
    # ----------------------------------------------------------
    # 【ここで決める 4 つのこと】
    #   (1) 管理者 (root) のパスワード
    #   (2) 最初に作るデータベース (= 倉庫) の名前
    #   (3) 普段使い用のユーザー名 (root はあぶないので専用ユーザーを作る)
    #   (4) そのユーザーのパスワード
    #
    # 【★ 重要な注意 ★ 初回だけ有効の仕組み】
    #   ここの値は MariaDB が『一番最初に起動した時』にだけ読まれます。
    #   2 回目以降は ./db_data/ フォルダの中に保存されている
    #   古い設定が優先されるので、ここを書き換えても反映されません。
    #
    #   パスワードを途中で変えたい場合の正しい手順:
    #     1) docker compose down -v     ← -v が超重要
    #        (※ -v を付けないと db_data/ が残って古いままです)
    #     2) .env のパスワードを書き換える
    #     3) docker compose up -d --build
    #
    # 【root とは?】
    #   どんな操作でもできてしまう『最強の管理者』のこと。
    #   プログラムから使うには権限が強すぎて危険なので、
    #   普段使いは MYSQL_USER の専用ユーザーを使います。
    #   (root は管理作業のときだけ呼び出す『社長アカウント』のイメージ)
    #
    # 【★ [D] との整合性 ★】
    #   下の MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD は、
    #   web 側 ([D]) の DB_DATABASE / DB_USERNAME / DB_PASSWORD と
    #   『必ず同じ値』にする必要があります。
    #   (.env を書き換えれば自動で両方に反映されるので、手動で
    #    片方だけ変えないように注意!)
    #
    # 【★ 本番公開するなら ★】
    #   下の root / taskflow_pass のような簡単なパスワードは絶対 NG。
    #   ランダムな長い文字列 (例: 32 文字以上) に必ず変更すること。
    # ==========================================================
    environment:

      # ------------------------------------------------------
      # MYSQL_ROOT_PASSWORD — 管理者 (root) のパスワード
      # ------------------------------------------------------
      # 【意味】 DB の『社長アカウント』のパスワード。
      #          phpMyAdmin からログインする時もこれを使います。
      # 【書換】 .env に: DB_ROOT_PASSWORD=<強いパスワード>
      # ------------------------------------------------------
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}

      # ------------------------------------------------------
      # MYSQL_DATABASE — 最初に作るデータベース名
      # ------------------------------------------------------
      # 【意味】 MariaDB が初回起動時に自動で作る空っぽのデータベース。
      #          この中に初期化スクリプト [G] が SQL を流してテーブルを
      #          作っていきます。
      # 【注意】 [D] の DB_DATABASE と必ず同じ値にすること。
      # 【書換】 .env に: DB_DATABASE=my_shop
      # ------------------------------------------------------
      MYSQL_DATABASE:      ${DB_DATABASE:-taskflow}

      # ------------------------------------------------------
      # MYSQL_USER — 普段使い用の専用ユーザー名
      # ------------------------------------------------------
      # 【意味】 root ではなく、Laravel アプリが DB に接続する時に
      #          使う専用のアカウント。上の MYSQL_DATABASE への
      #          読み書き権限だけを持つので、万が一パスワードが
      #          漏れても被害が広がりにくいメリットがあります
      #          (= 最小権限の原則)。
      # 【注意】 [D] の DB_USERNAME と必ず同じ値にすること。
      # ------------------------------------------------------
      MYSQL_USER:          ${DB_USERNAME:-taskflow_user}

      # ------------------------------------------------------
      # MYSQL_PASSWORD — 専用ユーザーのパスワード
      # ------------------------------------------------------
      # 【注意】 [D] の DB_PASSWORD と必ず同じ値にすること。
      # 【本番】 必ず強いパスワードに変える!
      # ------------------------------------------------------
      MYSQL_PASSWORD:      ${DB_PASSWORD:-taskflow_pass}

      # ------------------------------------------------------
      # TZ — MariaDB 側のタイムゾーン
      # ------------------------------------------------------
      # 【意味】 DB が日時カラム (CURRENT_TIMESTAMP など) を扱うときの
      #          時差。PHP 側の TZ と必ず揃えておかないと、
      #          「アプリの時計と DB の時計が 9 時間ズレる」事故が起きます。
      # ------------------------------------------------------
      TZ:                  ${TZ:-Asia/Tokyo}

    # ----------------------------------------------------------
    # volumes: データの永続化 + 初期化スクリプト
    # ----------------------------------------------------------
    volumes:
      # (1) DB データの永続化 (❌ここは触らない)
      #     MariaDB が /var/lib/mysql に書き込むデータを
      #     パソコンの ./db_data フォルダに保存します。
      #     こうしておくと、コンテナを消してもデータは残ります。
      - ./db_data:/var/lib/mysql

      # (2) ==============================================================
      #     🔧 量産ポイント [G] 自動初期化スクリプトの置き場所
      #     ==============================================================
      #
      #     【この仕組み (自動初期化) って何?】
      #       MariaDB / MySQL の公式イメージは、コンテナの中の
      #       `/docker-entrypoint-initdb.d/` という決まった場所に
      #       置かれた `.sql` や `.sh` ファイルを、
      #       『db_data が空っぽのとき』 だけ 自動で順番に実行してくれます。
      #
      #       これを使うと、プロジェクトを新しい PC で立ち上げた時に
      #       誰かが手動で SQL を流す必要がなくなり、
      #       『docker compose up 1 発で DB がまるごと組み上がる』
      #       という状態にできます。(= インフラのコード化)
      #
      #     【実行順】
      #       アルファベット順に実行されます。
      #       なので、テーブル作成 (schema) → 移行 (migration) の
      #       ように順番が大事な時は、ファイル名の先頭に数字を
      #       付けて並び順を固定するのが基本です:
      #         01_schema.sql
      #         02_migration_v4.1_app_config_longtext.sql
      #         03_seed_sample_data.sql
      #
      #     【左側 (ホスト側) のパスについて】
      #       `./${PUBLIC_DIR:-task-manager}/sql` は
      #       .env の PUBLIC_DIR 変数を使って自動的に組み立てられます。
      #       PUBLIC_DIR=public_html なら `./public_html/sql` が使われます。
      #
      #       自分のプロジェクトの SQL 置き場がちがうなら、
      #       このパス自体を書き換えても OK:
      #         例1) - ./database/sql:/docker-entrypoint-initdb.d:ro
      #         例2) - ./sql-init:/docker-entrypoint-initdb.d:ro
      #
      #     【右側 (コンテナ側) のパスについて】
      #       `/docker-entrypoint-initdb.d` は MariaDB 公式が決めた場所。
      #       ここは 絶対に 書き換えないでください。
      #       書き換えると自動実行してくれなくなります。
      #
      #     【`:ro` って何?】
      #       `ro` = read-only (読み取り専用) の略。
      #       コンテナの中から、このフォルダにファイルを書き込んだり
      #       消したりできないように鍵をかける印です。
      #       SQL の実行が勝手にファイルを上書きする事故を防げます。
      #
      #     【自動初期化を使いたくない場合】
      #       この行ごと削除、またはコメントアウトで OK。
      #       Laravel migration (php artisan migrate) で DB を作る
      #       運用にするならこの行は不要です。
      #
      #     【★ 大事な注意 ★】
      #       自動初期化 SQL が動くのは『db_data/ が空のとき』だけ。
      #       すでに db_data/ がある状態で SQL を差し替えても
      #       再実行されません。差し替えたい場合は:
      #         1) docker compose down -v
      #         2) rm -rf db_data
      #         3) docker compose up -d
      #       の順で、db_data を消してから起動し直す必要があります。
      - ./${PUBLIC_DIR:-task-manager}/sql:/docker-entrypoint-initdb.d:ro

    # ==========================================================
    # 🔧 量産ポイント [H] ports — DB の直接接続用ポート
    # ----------------------------------------------------------
    # 【この設定は何をしている?】
    #   パソコンの 3306 番の出入口を、コンテナの中の MariaDB
    #   (これも 3306 番) に繋ぎます。こうすると、
    #   パソコンから直接 DB に話しかけられるようになります。
    #
    # 【誰がこの設定を使う?】
    #   ・HeidiSQL / TablePlus / DBeaver / MySQL Workbench などの
    #     『DB 専用の管理ソフト』から直接繋ぎたい人
    #   ・VS Code の DB 拡張から SQL を書きたい人
    #
    # 【使わない場合は消しても OK】
    #   Laravel (web コンテナ) から DB に繋ぐのは network 経由なので、
    #   この ports は無くても本体は動きます。
    #   『phpMyAdmin だけで十分』という場合はこの 2 行を消すと
    #   セキュリティ的にも安心です (外から DB に触れる穴が 1 個減る)。
    #
    # 【本番公開するなら】
    #   ここは必ず消してください。本番サーバーの 3306 が
    #   インターネットに晒されていると、DB に直接ハッキングされる
    #   危険があります。
    #
    # 【ポート競合を避ける】
    #   他のアプリ (XAMPP の MySQL / ローカル MariaDB 等) が 3306 を
    #   使っていると "Bind for 0.0.0.0:3306 failed" エラーが出ます。
    #   → .env で DB_PORT=3307 などに変更。
    #   ★ 左 (ホスト側) だけ変えれば OK。右 (コンテナ側) の 3306 は
    #      MariaDB の標準なのでそのまま。
    # ==========================================================
    ports:
      - "${DB_PORT:-3306}:3306"

    # ----------------------------------------------------------
    # healthcheck: 生存確認
    # ----------------------------------------------------------
    # depends_on が service_healthy を待てるようにします。
    # mysqladmin ping で DB が応答するかを 5 秒ごとに確認。
    # ----------------------------------------------------------
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    restart: always

    networks:
      - app_network


  # ================================================================
  # ③ phpmyadmin — DB 管理画面 (ブラウザから操作できる)
  # ----------------------------------------------------------------
  # SQL を書かなくても、テーブルの中身を見たり編集したりできる
  # 便利な GUI ツール。開発中は必須級に便利。
  # ================================================================
  phpmyadmin:
    # 公式イメージをそのまま使う (設定ゼロで動く)
    image: phpmyadmin:latest

    container_name: ${COMPOSE_PROJECT_NAME:-taskflow}_phpmyadmin

    # ==========================================================
    # 🔧 量産ポイント [I] ports — phpMyAdmin のポート
    # ----------------------------------------------------------
    # 【phpMyAdmin って何?】
    #   SQL を覚えていなくても、ブラウザから DB のテーブルを
    #   見たり、データを追加・削除・編集できる便利な管理ツール。
    #   開発中は『DB の中身を目で確認する窓』として超役立ちます。
    #
    # 【ポート番号の読み方】
    #   "8081:80" の左右の意味は [C] と同じ。
    #     左 = パソコン側の出入口 (好きな番号に変えられる)
    #     右 = コンテナ側の出入口 (phpMyAdmin は 80 で固定)
    #
    #   ブラウザで http://localhost:8081 を開くと phpMyAdmin の
    #   ログイン画面が出ます。ユーザー名とパスワードは
    #   [F] で設定した root / MYSQL_ROOT_PASSWORD で入れます。
    #
    # 【変える時】
    #   ・8081 が他のアプリに使われている
    #   ・複数プロジェクトを同時起動している
    #
    # 【書き換え方】
    #   .env ファイルで:
    #     PMA_PORT=8091
    #
    # 【★ 本番公開するときの重大な注意 ★】
    #   phpMyAdmin をインターネットに公開すると、
    #   世界中からログイン試行の攻撃を受けます。
    #   本番では 必ず この `phpmyadmin:` サービス全体を
    #   丸ごとコメントアウトして、コンテナを動かさないでください。
    #   (管理画面が必要なら、SSH トンネル経由で開く等の別手段で)
    # ==========================================================
    ports:
      - "${PMA_PORT:-8081}:80"

    # ----------------------------------------------------------
    # phpMyAdmin が DB につなぐときの情報
    # ----------------------------------------------------------
    # PMA_HOST=db は『db サービス』に繋ぎなさいという意味。
    # ここはサービス名なので量産でもそのまま使えます。
    # ----------------------------------------------------------
    environment:
      PMA_HOST:     db
      PMA_USER:     root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      # phpMyAdmin から SQL をインポートするときの最大サイズ
      UPLOAD_LIMIT: 256M
      TZ:           ${TZ:-Asia/Tokyo}

    # db が起動してから phpMyAdmin を立ち上げる
    depends_on:
      - db

    restart: always

    networks:
      - app_network


# ================================================================
# networks — コンテナ同士を繋ぐ仮想 LAN
# ----------------------------------------------------------------
# 同じ network に属するコンテナは、サービス名 (web / db / phpmyadmin)
# をホスト名として解決できます。
# 例: Laravel の .env で DB_HOST=db と書けば MariaDB に繋がる。
# ================================================================
networks:
  app_network:
    driver: bridge


# ================================================================
# 🏭 新しいプロジェクトに量産する時の手順 (クイックガイド)
# ----------------------------------------------------------------
#
# 【ステップ 1】 必要なファイルをコピーする
#   新しいプロジェクトの空フォルダに、以下を丸ごとコピーします。
#     ├─ docker/                  (中身そのまま)
#     ├─ Dockerfile
#     ├─ docker-compose.yml       (このファイル)
#     └─ .env.docker.example
#
# 【ステップ 2】 .env を作る
#     cp .env.docker.example .env
#
# 【ステップ 3】 .env の中の値を書き換える (★ここが一番大事★)
#   ┌─────────────────────────────────────────────────────┐
#   │ 必ず変えるべき 6 つの値                              │
#   ├─────────────────────────────────────────────────────┤
#   │ COMPOSE_PROJECT_NAME = 新しい名前 (例: my-shop)      │
#   │ LARAVEL_DIR          = Laravel 本体のフォルダ名      │
#   │ PUBLIC_DIR           = 公開フォルダ名                │
#   │ WEB_PORT / PMA_PORT / DB_PORT = 空いているポート     │
#   │ DB_DATABASE / DB_USERNAME / DB_PASSWORD = DB 情報    │
#   │ APP_NAME / APP_URL   = アプリ名と URL                │
#   └─────────────────────────────────────────────────────┘
#
# 【ステップ 4】 起動する
#     docker compose up -d --build
#
# 【ステップ 5】 動作確認
#     docker compose ps                                   ← 3 つ Up か
#     http://localhost:WEB_PORT/                          ← ブラウザ確認
#     http://localhost:PMA_PORT/                          ← phpMyAdmin
#
# ----------------------------------------------------------------
# 🗺️ このファイルの 🔧 量産ポイント 一覧 (どこを変えるかの地図)
# ----------------------------------------------------------------
#   [A] web の build.args          → PHP バージョン・公開フォルダ
#   [B] web の container_name      → コンテナの呼び名
#   [C] web の ports               → Web アプリのポート
#   [D] web の environment         → Laravel 側の設定すべて
#   [E] db の image                → 使う DB の種類 (MariaDB / MySQL)
#   [F] db の environment          → DB のパスワード・ユーザー
#   [G] db の volumes (initdb.d)   → SQL 自動実行フォルダの場所
#   [H] db の ports                → DB 直接接続ポート
#   [I] phpmyadmin の ports        → 管理画面のポート
#
# ----------------------------------------------------------------
# ⚠️ つまずきポイント集
# ----------------------------------------------------------------
#
# 【ポートが衝突する】
#   "Bind for 0.0.0.0:8080 failed: port is already allocated"
#   → 他のアプリが同じポートを使っています。
#     `.env` で WEB_PORT / PMA_PORT / DB_PORT を別の番号に変更。
#
# 【DB のパスワードを変えたのに反映されない】
#   → MariaDB は『初回起動だけ』環境変数を読むので、
#     一度 `docker compose down -v` でデータを消す必要があります。
#     (-v を付けないと db_data が残って古いパスワードが有効のまま)
#
# 【web コンテナが再起動ループする】
#   → `docker compose logs web` でログを見る。
#     composer install 失敗 / vendor/autoload.php 不在が多い。
#     復旧: docker compose exec web bash -c \
#           "cd /var/www/html/\$LARAVEL_DIR && composer install"
#
# 【2 つ以上のプロジェクトを同時に動かしたい】
#   → 両方の `.env` で以下を別の値にしておくこと:
#     COMPOSE_PROJECT_NAME / WEB_PORT / PMA_PORT / DB_PORT
#
# ----------------------------------------------------------------
# 🔐 本番公開するときのチェックリスト
# ----------------------------------------------------------------
#   □ APP_ENV=production / APP_DEBUG=false に変更
#   □ DB_ROOT_PASSWORD / DB_PASSWORD を強いパスワードに変更
#   □ phpmyadmin サービスを丸ごとコメントアウト (公開しない)
#   □ db の ports: 3306 の公開も消す (コンテナ内だけで使う)
#   □ HTTPS 化する (リバースプロキシ or Apache に SSL 設定)
# ================================================================
