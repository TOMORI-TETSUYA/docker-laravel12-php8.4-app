; ================================================================
; docker/php/custom.ini — PHP のふるまいを上書きする設定ファイル
; ----------------------------------------------------------------
; このファイルは Dockerfile のビルド時に
; /usr/local/etc/php/conf.d/zz-custom.ini にコピーされて、
; デフォルトの php.ini を『最後に』上書きします。
;
; ★ zz- の接頭辞が付いている理由 ★
;   PHP は conf.d/ の中を『アルファベット順』に読み込むので、
;   zz- で始めると最後に読まれる = 一番強い設定になります。
;
; ★ __XXX__ のプレースホルダ ★
;   Dockerfile の RUN sed -i で、ビルド時に実際の値 (64M など)
;   に置き換えられます。docker-compose.yml の ARG から流れてきます。
;
; ★ 用語メモ ★
;   ini ファイル : セクション [foo] と key=value で設定を書く形式
;   OPcache     : PHP 解析結果をメモリにキャッシュして高速化する機能
;   CLI         : コマンドライン (php artisan 等) のこと
; ================================================================


; ================================================================
; 基本設定
; ================================================================

; アップロード 1 ファイルの最大サイズ
; __UPLOAD_MAX__ は docker-compose の PHP_UPLOAD_MAX で置換される
upload_max_filesize = __UPLOAD_MAX__

; POST リクエスト全体の最大サイズ (添付ファイル 1 個より大きく)
post_max_size = __UPLOAD_MAX__

; PHP が 1 リクエストで使えるメモリ上限
; Laravel は 256M 以上を推奨
memory_limit = __MEMORY_LIMIT__

; 1 リクエストで使える最大秒数 (2 分)
max_execution_time = 120

; 1 リクエストで使える最大入力時間 (= フォーム送信タイムアウト)
max_input_time = 120

; 入力変数の最大個数 (大きなフォームで引っかかる時に拡大)
max_input_vars = 5000

; タイムゾーン (Asia/Tokyo など)
date.timezone = __TZ__

; デフォルト文字コード
default_charset = UTF-8

; エラー表示 (本番では display_errors = Off に変更推奨)
display_errors = On
display_startup_errors = On

; ログ出力先
error_log = /var/log/php_errors.log

; セッションクッキーの有効期限 (秒) — 0 はブラウザ閉じるまで
session.cookie_lifetime = 0

; セッション Cookie を HTTPS でのみ送るか (本番では 1 に)
session.cookie_secure = 0

; JS から Cookie を読めなくする (XSS 対策)
session.cookie_httponly = 1

; 同一サイト Cookie 設定 (CSRF 対策)
session.cookie_samesite = Lax


; ================================================================
; OPcache 設定 (Laravel 高速化の肝)
; ----------------------------------------------------------------
; OPcache は PHP の解析結果をメモリに残すキャッシュ機能。
; Laravel みたいにファイル数が多いフレームワークでは、
; これを入れるだけで体感 2〜10 倍速くなります。
; ================================================================

; OPcache を有効化 (1 = ON / 0 = OFF)
opcache.enable = 1

; CLI (artisan コマンド) でも OPcache を使う
opcache.enable_cli = 1

; OPcache が使うメモリサイズ (MB)
; Laravel では 256MB 以上を推奨
opcache.memory_consumption = 256

; 文字列の重複を排除するバッファサイズ (MB)
opcache.interned_strings_buffer = 16

; キャッシュする最大ファイル数 (Laravel は多いので 2 万以上に)
opcache.max_accelerated_files = 20000

; ファイルが更新されたかを自動チェックするか
; 開発中 = 1 (チェックする)、本番 = 0 (最速だが再デプロイ時に OPcache リセット必要)
opcache.validate_timestamps = 1

; 自動チェックの間隔 (秒)
opcache.revalidate_freq = 2

; PHP ファイル内のコメントを保存する (PHPDoc が必要な場合 1)
opcache.save_comments = 1

; ファイルベースキャッシュ (メモリが不足した時の予備)
opcache.file_cache = /tmp/opcache

; すぐ使いきるキャッシュの挙動: 1 = 全部クリア
opcache.fast_shutdown = 1


; ================================================================
; Realpath キャッシュ (ファイルパス解決の高速化)
; ----------------------------------------------------------------
; Laravel は大量のファイルを require するので、このキャッシュが
; 大きいほど高速化します。
; ================================================================
realpath_cache_size = 4096K
realpath_cache_ttl = 600


; ================================================================
; セキュリティ (情報漏洩防止)
; ================================================================

; レスポンスヘッダに PHP のバージョンを含めない
expose_php = Off
