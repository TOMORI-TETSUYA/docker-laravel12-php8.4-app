# ================================================================
# docker/apache/000-default.conf — Apache VirtualHost 設定ファイル
# ----------------------------------------------------------------
# このファイルは Apache (Web サーバー) の『どのフォルダを公開するか』
# を決める設定書です。Dockerfile が /etc/apache2/sites-available/
# にコピーし、中の __PUBLIC_DIR__ を ARG で実際のフォルダ名に
# 置き換えます (task-manager / public_html / www など)。
#
# ★ VirtualHost (バーチャルホスト) って何? ★
#   1 台の Apache が『複数の Web サイト』を同時に動かせるしくみ。
#   IP:ポートごとに別のサイトを設定できます。
#   Docker コンテナ内では 1 サイトしか動かさないので * :80 のみ。
#
# ★ 用語メモ ★
#   DocumentRoot : 公開フォルダ (ブラウザから見える入口)
#   Directory    : フォルダごとの個別ルール
#   AllowOverride: .htaccess のルールをどこまで許すか
#   RewriteEngine: URL 書き換えを有効化するスイッチ
#   LogLevel     : ログの詳細度 (warn/info/debug)
# ================================================================


# すべての IP アドレスから 80 番ポート (HTTP) への接続を受ける
<VirtualHost *:80>

    # ----------------------------------------------------------
    # サイト管理者のメールアドレス (エラー画面に表示される)
    # ----------------------------------------------------------
    ServerAdmin webmaster@localhost

    # ----------------------------------------------------------
    # DocumentRoot: 公開フォルダの場所
    # ----------------------------------------------------------
    # __PUBLIC_DIR__ は Dockerfile のビルド時に sed で置換される
    # プレースホルダです。デフォルトでは `task-manager` になります。
    #
    # つまりブラウザからは /var/www/html/task-manager/ 配下だけが
    # 見える状態になり、それ以外 (laravel_app/ 等) は非公開。
    # ----------------------------------------------------------
    DocumentRoot /var/www/html/__PUBLIC_DIR__

    # ----------------------------------------------------------
    # 公開フォルダの個別ルール
    # ----------------------------------------------------------
    <Directory /var/www/html/__PUBLIC_DIR__>

        # フォルダ内のインデックス表示をオフ (= ファイル一覧を見せない)
        Options -Indexes +FollowSymLinks

        # .htaccess のルールを全部許可
        # (これが None だと task-manager/.htaccess が無視される)
        AllowOverride All

        # 全員にアクセス許可 (Apache 2.4 文法)
        Require all granted

        # URL 書き換えを有効化 (Laravel / SPA で必須)
        <IfModule mod_rewrite.c>
            RewriteEngine On
        </IfModule>
    </Directory>

    # ----------------------------------------------------------
    # 非公開フォルダへの直接アクセスを全面禁止 (念のため)
    # ----------------------------------------------------------
    # Laravel 本体 (laravel_app) がブラウザから直接見えないよう、
    # 仮に DocumentRoot を抜けてもアクセス拒否します。
    # ----------------------------------------------------------
    <Directory /var/www/html/laravel_app>
        Require all denied
    </Directory>

    # ----------------------------------------------------------
    # ログ出力先
    # ----------------------------------------------------------
    # docker logs で見られるように標準出力/標準エラーに流す設定。
    # /proc/self/fd/1 = 標準出力 / fd/2 = 標準エラー
    # ----------------------------------------------------------
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # ログの詳細度 (warn = 警告以上)
    LogLevel warn

    # ----------------------------------------------------------
    # gzip 圧縮を有効化 (転送量 50〜80% 削減)
    # ----------------------------------------------------------
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
        AddOutputFilterByType DEFLATE application/javascript application/json application/xml
        AddOutputFilterByType DEFLATE application/x-font-ttf font/opentype image/svg+xml
    </IfModule>

    # ----------------------------------------------------------
    # 静的ファイルのキャッシュ期限設定 (mod_expires)
    # ----------------------------------------------------------
    # CSS / JS / 画像を長くキャッシュさせることで体感を高速化。
    # バージョン更新時は `?v=2` 等のクエリでキャッシュ回避。
    # ----------------------------------------------------------
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault                          "access plus 1 hour"
        ExpiresByType text/css                  "access plus 1 month"
        ExpiresByType application/javascript    "access plus 1 month"
        ExpiresByType image/png                 "access plus 1 year"
        ExpiresByType image/jpeg                "access plus 1 year"
        ExpiresByType image/svg+xml             "access plus 1 year"
        ExpiresByType image/x-icon              "access plus 1 year"
        ExpiresByType font/woff                 "access plus 1 year"
        ExpiresByType font/woff2                "access plus 1 year"
    </IfModule>

    # ----------------------------------------------------------
    # セキュリティヘッダ (XSS / クリックジャッキング対策)
    # ----------------------------------------------------------
    <IfModule mod_headers.c>
        # ブラウザに MIME スニッフィングをやめさせる
        Header set X-Content-Type-Options "nosniff"

        # iframe への埋め込み禁止 (クリックジャッキング対策)
        Header set X-Frame-Options "SAMEORIGIN"

        # クロスサイトスクリプティング対策 (旧ブラウザ向け)
        Header set X-XSS-Protection "1; mode=block"

        # Referrer 情報の送信ルール
        Header set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

</VirtualHost>

# ================================================================
# 補足: 本番サーバー向けのチューニング
# ----------------------------------------------------------------
# 1. SSL (HTTPS) を使う時は別途 `<VirtualHost *:443>` を追加し
#    SSLCertificateFile / SSLCertificateKeyFile を指定
# 2. HTTP → HTTPS リダイレクトするなら:
#      RewriteCond %{HTTPS} off
#      RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
# 3. アクセスログが膨張するので logrotate の設定もお忘れなく
# ================================================================
